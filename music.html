<!DOCTYPE html>
<html>
<head>
  <title>Music Player</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #1e293b;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .player {
      background: white;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      width: 320px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    h2 {
      color: #2563eb;
      margin-bottom: 20px;
    }

    audio {
      width: 100%;
      margin-bottom: 20px;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 10px 18px;
      margin: 5px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>

<body>

  <div class="player">
    <h2 id="title">Song 1</h2>

    <audio id="audio" controls></audio>

    <button onclick="previousSong()">⏮ Previous</button>
    <button onclick="nextSong()">Next ⏭</button>
  </div>

  <script>
    const songs = ["song1.mp3", "song2.mp3"];
    let currentSong = 0;

    const audio = document.getElementById("audio");
    const title = document.getElementById("title");

    function loadSong() {
      audio.src = songs[currentSong];
      title.innerText = "Song " + (currentSong + 1);
    }

    function nextSong() {
      currentSong = (currentSong + 1) % songs.length;
      loadSong();
      audio.play();
    }

    function previousSong() {
      currentSong = (currentSong - 1 + songs.length) % songs.length;
      loadSong();
      audio.play();
    }

    loadSong();
  </script>

</body>
</html>
